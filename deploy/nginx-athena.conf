# Add these blocks inside the existing server block for www.ilogicmagic.com
# in /etc/nginx/sites-available/payment-demo.
#
# Static frontend files are deployed to:
# /home/ubuntu/payment_gateway_demo/athena
#
# The API is managed by PM2 on:
# http://127.0.0.1:8000

location = /athena {
    return 301 /athena/;
}

location /athena/ {
    alias /home/ubuntu/payment_gateway_demo/athena/;
    try_files $uri $uri/ /athena/index.html;
}

location = /athena-api {
    return 301 /athena-api/;
}

location /athena-api/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25M;
}
