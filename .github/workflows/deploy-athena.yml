name: Deploy Athena

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: athena-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ec2-13-127-219-128.ap-south-1.compute.amazonaws.com
      EC2_USER: ubuntu
      APP_DIR: /home/ubuntu/athena
      WEB_DIR: /home/ubuntu/payment_gateway_demo/athena
      API_PORT: "8000"
      PUBLIC_WEB_URL: https://www.ilogicmagic.com/athena
      PUBLIC_API_URL: https://www.ilogicmagic.com/athena-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/athena_key
          chmod 600 ~/.ssh/athena_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote directories
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/athena_key "$EC2_USER@$EC2_HOST" \
            "mkdir -p '$APP_DIR' '$WEB_DIR'"

      - name: Upload repository to EC2
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'DerivedData' \
            --exclude 'apps/athena-api/uploads/*' \
            --exclude 'apps/athena-api/data/sessions/*' \
            -e "ssh -i ~/.ssh/athena_key" \
            ./ "$EC2_USER@$EC2_HOST:$APP_DIR/"

      - name: Build and restart on EC2
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/athena_key "$EC2_USER@$EC2_HOST" \
            "APP_DIR='$APP_DIR' WEB_DIR='$WEB_DIR' API_PORT='$API_PORT' PUBLIC_WEB_URL='$PUBLIC_WEB_URL' PUBLIC_API_URL='$PUBLIC_API_URL' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$APP_DIR"

          if [ ! -f .env ]; then
            cp deploy/production.env.example .env
            echo "Created $APP_DIR/.env. Set OPENAI_API_KEY before first real capture."
          fi

          set -a
          . ./.env
          set +a

          export NODE_ENV=production
          export PORT="${PORT:-$API_PORT}"
          export WEB_BASE_URL="${WEB_BASE_URL:-$PUBLIC_WEB_URL}"
          export OPENAI_MODEL="${OPENAI_MODEL:-gpt-4o}"

          mkdir -p apps/athena-api/uploads apps/athena-api/data/sessions "$WEB_DIR"

          npm ci --prefix apps/athena-api
          npm ci --prefix apps/athena-web

          npm --prefix apps/athena-api run build
          VITE_API_URL="$PUBLIC_API_URL" VITE_BASE_PATH="/athena/" npm --prefix apps/athena-web run build

          rsync -a --delete apps/athena-web/dist/ "$WEB_DIR/"

          pm2 startOrReload ecosystem.config.cjs --only athena-api --update-env
          pm2 save

          echo "Athena deployed:"
          echo "  Web: $PUBLIC_WEB_URL/latest"
          echo "  API: $PUBLIC_API_URL/api/health"
REMOTE

      - name: Verify public health endpoint
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "$PUBLIC_API_URL/api/health"
