# Add these blocks inside the existing server block for www.ilogicmagic.com
# in /etc/nginx/sites-available/payment-demo.
#
# Static frontend files are deployed to:
# /home/ubuntu/payment_gateway_demo/screensolver
#
# The backend is managed by PM2 on:
# http://127.0.0.1:8000

location = /screensolver {
    return 301 /screensolver/;
}

location /screensolver/ {
    alias /home/ubuntu/payment_gateway_demo/screensolver/;
    try_files $uri $uri/ /screensolver/index.html;
}

location = /screensolver-api {
    return 301 /screensolver-api/;
}

location /screensolver-api/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25M;
}
